{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-md border border-gray-100 p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Change Password</h1>
    <p class="text-sm text-gray-600 mb-6">
        Enter your email address and we will send you a password reset link.
    </p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Email Address
            </label>
            <input
                type="email"
                name="{{ form.email.name }}"
                id="{{ form.email.id_for_label }}"
                value="{{ form.email.value|default:'' }}"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                required
            >
            {% for error in form.email.errors %}
                <p class="text-sm text-red-600 mt-1">{{ error }}</p>
            {% endfor %}
        </div>

        <button type="submit"
                class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-secondary transition">
            Send Reset Link
        </button>
    </form>
</div>
{% endblock %}
