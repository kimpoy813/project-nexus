{% extends 'accounts_base.html' %}
{% block content %}
<section class="pt-24 pb-20">
    <div class="max-w-7xl mx-auto px-6">

        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border border-gray-100">

            <!-- Header -->
            <div class="bg-primary text-white rounded-t-2xl px-8 py-6">
                <h2 class="text-2xl font-bold">Welcome Back</h2>
                <p class="text-sm opacity-80">Sign in to continue</p>
            </div>

            <!-- Body -->
            <div class="p-8">

                {% if error %}
                <div class="bg-secondary/10 border border-secondary text-secondary p-3 rounded-lg mb-6 text-sm">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.GET.next }}">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Username/Email
                        </label>
                        <input name="username" required
                            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>

                    <div class="text-right -mt-2">
                        <a href="{% url 'password_reset' %}"
                           class="text-sm text-primary font-medium hover:text-secondary transition">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-white py-3 rounded-lg hover:bg-secondary transition font-semibold">
                        Login
                    </button>
                </form>

                <p class="text-center mt-6 text-sm text-gray-600">
                    Don’t have an account?
                    <a href="{% url 'register' %}" class="text-primary font-semibold hover:text-secondary transition">
                        Register
                    </a>
                </p>

            </div>
        </div>

    </div>
</section>

<script>
function togglePassword(id, iconId) {
    const input = document.getElementById(id);
    const icon = document.getElementById(iconId);

    if (input.type === "password") {
        input.type = "text";
        icon.innerText = "🙈";
    } else {
        input.type = "password";
        icon.innerText = "👁";
    }
}

document.querySelector('form').addEventListener('submit', function(e) {
    const submitBtn = this.querySelector('button[type="submit"]');
    if (submitBtn.disabled) {
        e.preventDefault();
    } else {
        submitBtn.disabled = true;
    }
});
</script>
{% endblock %}
