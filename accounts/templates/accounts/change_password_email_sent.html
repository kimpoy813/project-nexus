{% extends "accounts_base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-md border border-gray-100 p-8 text-center">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Check Your Email</h1>
    <p class="text-sm text-gray-600 mb-6">
        We sent a password reset link to <span class="font-semibold">{{ email }}</span>.
    </p>

    <a href="{% url 'profile_view' %}"
       class="inline-block bg-primary text-white px-6 py-3 rounded-xl font-semibold hover:bg-secondary transition">
        Back to Profile
    </a>
</div>
{% endblock %}
