{% extends "dashboard/dashboard_base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Personnel</h1>
        <a href="{% url 'personnel_create' %}" class="bg-primary text-white px-4 py-2 rounded-lg">Add Personnel</a>
    </div>

    <div class="bg-white border rounded-xl overflow-hidden">
        <table class="min-w-full">
        <thead class="bg-gray-50">
            <tr>
            <th class="text-left p-3">Name</th>
            <th class="text-left p-3">Position</th>
            <th class="text-left p-3">Email</th>
            <th class="text-left p-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in personnel %}
            <tr class="border-t">
            <td class="p-3">{{ p.name }}</td>
            <td class="p-3">{{ p.position }}</td>
            <td class="p-3">{{ p.email }}</td>
            <td class="p-3 space-x-3">
                <a class="text-blue-600" href="{% url 'personnel_edit' p.id %}">Edit</a>
                <a class="text-red-600" href="{% url 'personnel_delete' p.id %}">Delete</a>
            </td>
            </tr>
            {% empty %}
            <tr><td class="p-6 text-gray-500" colspan="4">No personnel yet.</td></tr>
            {% endfor %}
        </tbody>
        </table>
    </div>

</div>

{% endblock %}
