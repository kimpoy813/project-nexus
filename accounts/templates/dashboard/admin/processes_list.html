{% extends "dashboard/dashboard_base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto p-6">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold">Processes</h1>
        <a href="{% url 'process_create' %}" class="px-4 py-2 rounded bg-primary text-white">Add Process</a>
    </div>

    <div class="bg-white border rounded-lg overflow-hidden">
        <table class="w-full">
        <thead class="bg-gray-50">
            <tr>
            <th class="text-left p-3">Title</th>
            <th class="text-left p-3">Order</th>
            <th class="text-left p-3">Steps</th>
            <th class="text-left p-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in processes %}
            <tr class="border-t">
            <td class="p-3">{{ p.title }}</td>
            <td class="p-3">{{ p.order }}</td>
            <td class="p-3">{{ p.steps.count }}</td>
            <td class="p-3 space-x-2">
                <a class="text-blue-600" href="{% url 'process_edit' p.id %}">Edit</a>
                <a class="text-red-600" href="{% url 'process_delete' p.id %}">Delete</a>
            </td>
            </tr>
            {% empty %}
            <tr><td class="p-3" colspan="4">No processes yet.</td></tr>
            {% endfor %}
        </tbody>
        </table>
    </div>
</div>

{% endblock %}
